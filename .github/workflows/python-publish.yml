# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    name: Build Python 🐍package 📦 and upload release to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - name: Clean previous build artifacts
      run: rm -rf dist build *.egg-info
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Validate package version matches release tag
      if: github.event_name == 'release'
      run: |
        PKG_VERSION=$(python - <<'PY'
        import re
        from pathlib import Path

        text = Path('setup.py').read_text(encoding='utf-8')
        match = re.search(r'version\s*=\s*"([^"]+)"', text)
        if not match:
            raise SystemExit('Could not find version in setup.py')
        print(match.group(1))
        PY
        )
        TAG_VERSION="${GITHUB_REF_NAME}"
        if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
          echo "Tag/version mismatch: tag=$TAG_VERSION setup.py=$PKG_VERSION"
          exit 1
        fi
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: dist/
